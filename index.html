<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delta Prime</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7f8fc;
}

/* HEADER */

header{
position:fixed;
width:100%;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,.05);
z-index:1000;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo img{
height:40px;
}

.menu{
display:flex;
}

.menu a{
margin-left:30px;
text-decoration:none;
color:#333;
font-weight:500;
}

/* HERO */

.hero{
height:100vh;
background:linear-gradient(rgba(10,42,102,.85),rgba(10,42,102,.85)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
display:flex;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.btn{
background:#f5b400;
padding:15px 30px;
border-radius:5px;
text-decoration:none;
color:black;
font-weight:600;
}

/* SEÇÕES */

section{
padding:90px 20px;
}

.title{
text-align:center;
margin-bottom:40px;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

/* PORTFOLIO */

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.portfolio img{
width:100%;
border-radius:10px;
}

/* FORM */

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:15px;
border-radius:5px;
border:1px solid #ddd;
}

button{
padding:15px;
background:#0a2a66;
color:white;
border:none;
}

/* FOOTER */

footer{
background:#0a2a66;
color:white;
text-align:center;
padding:30px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:15px;
border-radius:50%;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
</div>

<div class="menu">

<a href="#">Inicio</a>
<a href="servicos.html">Serviços</a>
<a href="#contato">Contato</a>

</div>

</nav>

</div>

</header>

<section class="hero">

<div class="container">

<h1>Manutenção Predial Profissional</h1>

<p>Seu condomínio seguro e valorizado</p>

<a href="#contato" class="btn">Solicitar Orçamento</a>

</div>

</section>

<section>

<div class="container">

<div class="title">
<h2>Serviços</h2>
</div>

<div class="services">

<div class="card">Elétrica</div>
<div class="card">Hidráulica</div>
<div class="card">Pintura</div>
<div class="card">Manutenção</div>

</div>

</div>

</section>

<section id="contato">

<div class="container">

<div class="title">
<h2>Contato</h2>
</div>

<form onsubmit="enviarWhats(event)">

<input type="text" placeholder="Nome" id="nome">

<input type="email" placeholder="Email" id="email">

<textarea placeholder="Mensagem" id="mensagem"></textarea>

<button>Enviar</button>

</form>

</div>

</section>

<footer>

<img src="logo.png" height="40">

<p>© 2026 Delta Prime</p>

</footer>

<a class="whatsapp" href="https://wa.me/5583998824850">💬</a>

<script>

function enviarWhats(e){

e.preventDefault()

let nome = document.getElementById("nome").value
let email = document.getElementById("email").value
let mensagem = document.getElementById("mensagem").value

let texto = `Olá, me chamo ${nome}%0AEmail: ${email}%0AMensagem: ${mensagem}`

window.open(`https://wa.me/5583998824850?text=${texto}`)

}

</script>

</body>

</html>
